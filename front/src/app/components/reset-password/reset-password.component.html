<div class="container">
  <div class="reset-password-card">
    <h2 class="title">Réinitialisez votre mot de passe
</h2>
    <p class="subtitle">Créez un nouveau mot de passe pour votre compte</p>
    
    <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="password">Nouveau mot de passe</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Entrez le nouveau mot de passe"
          class="input-field"
          [class.error]="resetPasswordForm.get('password')?.invalid && resetPasswordForm.get('password')?.touched"
        />
        <div *ngIf="resetPasswordForm.get('password')?.invalid && resetPasswordForm.get('password')?.touched" class="error-message">
          Le mot de passe doit contenir au moins 6 caractères.
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmez le mot de passe</label>
        <input
          type="password"
          id="confirmPassword"
          formControlName="confirmPassword"
          placeholder="Confirmez le nouveau mot de passe"
          class="input-field"
          [class.error]="showPasswordMismatchError()"
        />
        <div *ngIf="showPasswordMismatchError()" class="error-message">
          Les mots de passe ne correspondent pas.
        </div>
      </div>

      <button type="submit" class="submit-btn" [disabled]="resetPasswordForm.invalid">
        Réinitialiser le mot de passe
      </button>
    </form>

    <div class="footer">
      <a routerLink="/" class="back-link">← Retour à la page de connexion</a>
    </div>

    <div *ngIf="message" class="success-message">{{ message }}</div>
    <div *ngIf="error" class="error-message">{{ error }}</div>
  </div>
</div>
