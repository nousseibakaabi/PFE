<div class="min-h-screen flex">
  <!-- Left Side - Form -->
  <div class="w-full lg:w-1/2 flex items-center justify-center p-8 bg-white dark:bg-gray-900">
    <div class="max-w-md w-full animate-fadeIn">
      <!-- Back to Login Link -->
      

      <!-- Header -->
      <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">Mot de passe oublié ?</h1>
        <p class="text-gray-500 dark:text-gray-400">
          Entrez votre adresse e-mail, et nous vous enverrons les instructions de réinitialisation.
        </p>
      </div>

      <!-- Form -->
      <form [formGroup]="forgetPasswordForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <!-- Email Field -->
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            Adresse e-mail
          </label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-400 group-focus-within:text-[#6DB9D5] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12H8m8-6H8m8 12H8m8-6H8" />
              </svg>
            </div>
            <input
              type="email"
              id="email"
              formControlName="email"
              placeholder="exemple@email.com"
              class="block w-full pl-10 pr-3 py-3 border text-[16px] border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:border-[#6DB9D5] focus:ring-2 focus:ring-[#6DB9D5]/20 transition-all duration-200"
              [class.border-red-500]="forgetPasswordForm.get('email')?.invalid && forgetPasswordForm.get('email')?.touched"
            />
          </div>
          <div *ngIf="forgetPasswordForm.get('email')?.invalid && forgetPasswordForm.get('email')?.touched" 
               class="mt-2 text-xs text-red-600 dark:text-red-400">
            Veuillez entrer une adresse e-mail valide
          </div>
        </div>

        <!-- Submit Button -->
        <button 
          type="submit" 
          class="w-full py-3 px-4 border border-transparent rounded-lg text-sm font-medium text-white bg-[#6DB9D5] hover:bg-[#5a9bb5] focus:outline-none focus:ring-2 focus:ring-[#6DB9D5] focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98]"
          [disabled]="forgetPasswordForm.invalid"
        >
          <span *ngIf="!isLoading">Envoyer le lien </span>
          <span *ngIf="isLoading" class="flex items-center justify-center">
            <svg class="animate-spin h-5 w-5 mr-2 text-white" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Envoi en cours...
          </span>
        </button>


      </form>

      <!-- Messages -->
      <div *ngIf="message" class="mt-4 p-3 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-lg">
        <p class="text-xs text-green-600 dark:text-green-400">{{ message }}</p>
      </div>

      <div *ngIf="error" class="mt-4 p-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg">
        <p class="text-xs text-red-600 dark:text-red-400">{{ error }}</p>
      </div>


<div class="mt-6 text-center">
        <a routerLink="/" class="inline-flex items-center text-[13px] font-medium text-[#6DB9D5] hover:text-[#5a9bb5] dark:text-[#6DB9D5] dark:hover:text-[#5a9bb5] transition-colors duration-200">
          Retour à la page de connexion
        </a>
      </div>
     

      
    </div>
    
  </div>

<!-- Right Side - Animated Illustration -->
<div class="hidden lg:block lg:w-1/2 bg-gradient-to-br bg-[#64ACC8] dark:from-[#4A8AA5] dark:to-[#2D5A70] relative overflow-hidden">
    <div class="fixed top-6 right-6 z-50">
  <button (click)="toggleDarkMode()" 
    class="p-3 rounded-2xl bg-white/90 dark:bg-gray-800/90 backdrop-blur-sm shadow-xl border border-gray-200 dark:border-gray-700 text-[#6DB9D5] dark:text-[#6DB9D5] hover:scale-110 transition-all active:scale-95 flex items-center gap-2 font-medium text-sm">
    <span class="material-icons text-xl">{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</span>
    <span class="hidden sm:inline">{{ isDarkMode ? 'Mode clair' : 'Mode sombre' }}</span>
  </button>
</div>
    <!-- Floating Icons Container -->
    <div class="absolute inset-0">
      <!-- Envelope Icon -->
      <div class="absolute top-1/4 left-1/4 animate-float-slow">
        <div class="w-16 h-16 bg-white/20 backdrop-blur-lg rounded-2xl flex items-center justify-center transform rotate-12 hover:rotate-0 transition-transform duration-500">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
        </div>
      </div>

      <!-- Lock Icon -->
      <div class="absolute top-1/4 right-1/3 animate-float">
        <div class="w-20 h-20 bg-white/20 backdrop-blur-lg rounded-2xl flex items-center justify-center transform -rotate-12 hover:rotate-0 transition-transform duration-500">
          <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
        </div>
      </div>

      <!-- Key Icon -->
      <div class="absolute bottom-1/4 right-1/4 animate-float-fast">
        <div class="w-14 h-14 bg-white/20 backdrop-blur-lg rounded-2xl flex items-center justify-center transform rotate-45 hover:rotate-0 transition-transform duration-500">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
          </svg>
        </div>
      </div>

      <!-- Message Icon -->
      <div class="absolute bottom-1/4 left-1/4 animate-float-slow-reverse">
        <div class="w-16 h-16 bg-white/20 backdrop-blur-lg rounded-2xl flex items-center justify-center transform -rotate-6 hover:rotate-0 transition-transform duration-500">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
          </svg>
        </div>
      </div>

      <!-- Bell Icon -->
      <div class="absolute top-2/3 right-1/2 animate-float-medium">
        <div class="w-12 h-12 bg-white/20 backdrop-blur-lg rounded-2xl flex items-center justify-center transform rotate-90 hover:rotate-0 transition-transform duration-500">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
          </svg>
        </div>
      </div>

      <!-- Star Icons (Decorative) -->
      <div class="absolute top-10 left-10 animate-ping-slow">
        <svg class="w-4 h-4 text-white/40" fill="currentColor" viewBox="0 0 20 20">
          <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
        </svg>
      </div>

      <div class="absolute bottom-10 right-10 animate-ping-slow animation-delay-1000">
        <svg class="w-3 h-3 text-white/40" fill="currentColor" viewBox="0 0 20 20">
          <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
        </svg>
      </div>
    </div>

    <!-- Centered Text -->
    <div class="absolute inset-0 flex items-center justify-center">
      <div class="text-center text-white animate-fadeInUp">
        <h2 class="text-4xl font-bold mb-4">Bon retour !</h2>
        <p class="text-xl opacity-90">Nous vous aiderons à réinitialiser votre mot de passe</p>
      </div>
    </div>

    <!-- Floating Particles -->
    <div class="absolute bottom-0 left-0 right-0 h-32 bg-gradient-to-t from-black/10 to-transparent"></div>
  </div>
</div>
