<div class="container">
  <div class="forget-password-card">
    <h2 class="title">Mot de passe oublié ?
</h2>
    <p class="subtitle">Entrez votre adresse e-mail et nous vous enverrons un lien de réinitialisation</p>
    
    <form [formGroup]="forgetPasswordForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Adresse e-mail</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="Entrez votre adresse e-mail"
          class="input-field"
          [class.error]="forgetPasswordForm.get('email')?.invalid && forgetPasswordForm.get('email')?.touched"
        />
        <div *ngIf="forgetPasswordForm.get('email')?.invalid && forgetPasswordForm.get('email')?.touched" class="error-message">
          Veuillez entrer une adresse e-mail valide.
        </div>
      </div>

      <button type="submit" class="submit-btn" [disabled]="forgetPasswordForm.invalid">
Envoyer le lien de réinitialisation
      </button>
    </form>

    <div class="footer">
      <a routerLink="/" class="back-link">← Retour à la page de connexion</a>
    </div>

    <div *ngIf="message" class="success-message">{{ message }}</div>
    <div *ngIf="error" class="error-message">{{ error }}</div>
  </div>
</div>
