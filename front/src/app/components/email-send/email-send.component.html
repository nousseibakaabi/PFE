<div class="container">
  <div class="success-card">
    <div class="icon-container">
      <div class="icon-circle">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#217093" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
      </div>
    </div>
    
    <h2 class="title">Vérifiez votre e-mail !</h2>
    
    <div class="message">
      Nous avons envoyé les instructions de réinitialisation du mot de passe à
      <br>
      <strong>{{ email || 'votre adresse e-mail' }}</strong>
    </div>
    
    <div class="instructions">
      Le lien expirera dans 24 heures. Si vous ne voyez pas l’e-mail,
      vérifiez votre dossier spam ou réessayez.

    </div>
    
    <div class="button-group">
      
      
      <button class="secondary-btn" (click)="resendEmail()" [disabled]="isResending">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 4v6h-6"></path>
          <path d="M1 20v-6h6"></path>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"></path>
          <path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"></path>
        </svg>
        {{ isResending ? 'Envoi en cours...' : 'Renvoyer l’e-mail' }}
      </button>
    </div>
    
    

    <div *ngIf="resendSuccess" class="success-message">
      E-mail renvoyé avec succès!
    </div>
    <div *ngIf="resendError" class="error-message">
      {{ resendError }}
    </div>
    
  </div>
</div>
