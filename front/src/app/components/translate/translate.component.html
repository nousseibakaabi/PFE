<div class="relative mt-3">
      <button
        (click)="toggleDropdown()"
          class="hover:text-dark-900 mt-3 relative flex h-9 w-9 items-center justify-center rounded-full border border-gray-200 bg-white text-gray-500 transition-colors hover:bg-gray-100 hover:text-gray-700 dark:border-gray-800 dark:bg-gray-900 dark:text-gray-400 dark:hover:bg-gray-800 dark:hover:text-white"
      >
        <span class="text-base mb-1">{{ getCurrentLanguageFlag() }}</span>
       
      </button>

      <!-- Dropdown -->
      <div
        *ngIf="isOpen"
        class="absolute right-0 mt-2 w-48 rounded-lg border border-gray-200 bg-white shadow-lg dark:border-gray-700 dark:bg-gray-800 z-50 overflow-hidden"
      >
        <div class="py-1">
          <button
            *ngFor="let lang of languages"
            (click)="changeLanguage(lang.code)"
            class="flex w-full items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-700 transition-colors"
            [class.bg-gray-100]="currentLang === lang.code"
            [class.dark:bg-gray-700]="currentLang === lang.code"
          >
            <span class="text-base mr-2">{{ lang.flag }}</span>
            <span class="flex-1 text-left">{{ lang.name }}</span>
            <svg *ngIf="currentLang === lang.code" class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
