<!-- renewal-form-modal.component.html -->
<div *ngIf="show" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" (click)="onClose()">
  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl max-w-3xl w-full max-h-[90vh] overflow-y-auto" (click)="$event.stopPropagation()">
    
    <!-- Header -->
    <div class="bg-gradient-to-r from-purple-500 to-purple-600 px-6 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
          </div>
          <div>
            <h3 class="text-white font-bold text-lg">Renouveler la convention</h3>
            <p class="text-purple-100 text-xs">{{ convention?.referenceConvention }}</p>
          </div>
        </div>
        <button (click)="onClose()" class="text-white/80 hover:text-white p-1 hover:bg-white/10 rounded-lg">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Info Message -->
    <div class="px-6 pt-4">
      <div class="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-lg p-3">
        <div class="flex items-start gap-2">
          <svg class="w-4 h-4 text-blue-600 dark:text-blue-400 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <div>
            <p class="text-xs text-blue-700 dark:text-blue-300 font-medium">
              La référence, l'application et la structure bénéficiel restent identiques
            </p>
            <p class="text-xs text-blue-600 dark:text-blue-400 mt-1">
              Vous pouvez modifier tous les autres champs selon vos besoins.
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- Form -->
    <div class="p-6">
      <form (ngSubmit)="onSubmit()" class="space-y-4">
        <!-- Libellé -->
        <div>
          <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">
            Libellé <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            [(ngModel)]="formData.libelle"
            name="libelle"
            required
            class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 dark:bg-gray-700 dark:text-white"
            placeholder="Libellé de la convention"
          />
        </div>

        <!-- Reference ERP -->
        <div>
          <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">
            Référence ERP
          </label>
          <input
            type="text"
            [(ngModel)]="formData.referenceERP"
            name="referenceERP"
            class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 dark:bg-gray-700 dark:text-white"
            placeholder="ERP-REF-001"
          />
        </div>

        <!-- Dates -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
          <div>
            <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">
              Date Début <span class="text-red-500">*</span>
            </label>
            <input
              type="date"
              [(ngModel)]="formData.dateDebut"
              name="dateDebut"
              required
              class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 dark:bg-gray-700 dark:text-white"
            />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">
              Date Fin <span class="text-red-500">*</span>
            </label>
            <input
              type="date"
              [(ngModel)]="formData.dateFin"
              name="dateFin"
              required
              class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 dark:bg-gray-700 dark:text-white"
            />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">
              Date Signature
            </label>
            <input
              type="date"
              [(ngModel)]="formData.dateSignature"
              name="dateSignature"
              class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 dark:bg-gray-700 dark:text-white"
            />
          </div>
        </div>

        <!-- Financial Fields -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
          <div>
            <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">
              Montant HT (TND) <span class="text-red-500">*</span>
            </label>
            <input
              type="number"
              [(ngModel)]="formData.montantHT"
              name="montantHT"
              (ngModelChange)="onMontantHTChange()"
              step="0.01"
              min="0"
              required
              class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 dark:bg-gray-700 dark:text-white"
              placeholder="0.00"
            />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">
              TVA (%)
            </label>
            <input
              type="number"
              [(ngModel)]="formData.tva"
              name="tva"
              (ngModelChange)="onTvaChange()"
              step="0.01"
              min="0"
              max="100"
              class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 dark:bg-gray-700 dark:text-white"
            />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">
              Montant TTC (TND)
            </label>
            <input
              type="number"
              [(ngModel)]="formData.montantTTC"
              name="montantTTC"
              readonly
              class="w-full px-3 py-2 text-sm bg-gray-100 dark:bg-gray-600 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-600 dark:text-gray-300 cursor-not-allowed"
              placeholder="Auto"
            />
          </div>
        </div>

        <!-- Users and Periodicity -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">
              Nombre d'utilisateurs <span class="text-red-500">*</span>
            </label>
            <input
              type="number"
              [(ngModel)]="formData.nbUsers"
              name="nbUsers"
              min="1"
              step="1"
              required
              class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 dark:bg-gray-700 dark:text-white"
              placeholder="Saisir le nombre"
            />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">
              Périodicité <span class="text-red-500">*</span>
            </label>
            <select
              [(ngModel)]="formData.periodicite"
              name="periodicite"
              required
              class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 dark:bg-gray-700 dark:text-white"
            >
              <option *ngFor="let p of periodicites" [value]="p">{{ p }}</option>
            </select>
          </div>
        </div>

        <!-- Buttons -->
        <div class="flex gap-3 pt-4 border-t border-gray-200 dark:border-gray-700">
          <button type="button" (click)="onClose()" 
                  class="flex-1 px-4 py-2 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-lg text-sm font-medium hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
            Annuler
          </button>
          <button type="submit"
                  class="flex-1 px-4 py-2 bg-gradient-to-r from-purple-500 to-purple-600 hover:from-purple-600 hover:to-purple-700 text-white rounded-lg text-sm font-medium shadow-sm hover:shadow transition-all">
            Confirmer le renouvellement
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
