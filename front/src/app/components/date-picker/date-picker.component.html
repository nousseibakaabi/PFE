<!-- Date Picker Template - Smaller & Cuter -->
<div class="relative date-picker-wrapper">
  <!-- Cuter input field -->
<input
  type="text"
  [value]="formattedDate"
  (click)="toggleDatePicker()"
  (focus)="toggleDatePicker()"
  readonly
  class="w-full px-3 py-2 text-xs border border-gray-200 dark:border-gray-600 rounded-lg focus:ring-1 focus:ring-blue-500 focus:border-blue-500 focus:outline-none dark:bg-gray-700 dark:text-white bg-gray-50 dark:bg-gray-800/50 cursor-pointer transition-all duration-200 hover:border-blue-300 dark:hover:border-blue-600"
  [placeholder]="placeholder"
/>



  <!-- Smaller calendar icon -->
  <svg class="absolute calendar-icon pointer-events-none" 
       fill="none" 
       stroke="currentColor" 
       viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
  </svg>

  <!-- Smaller calendar popup -->
  <div *ngIf="showDatePicker" 
       class="absolute z-50 mt-1 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl shadow-xl calendar-popup animate-fadeIn">
    
    <!-- Smaller header -->
    <div class="flex items-center justify-between calendar-header">
      <button type="button" (click)="previousMonth()" 
              class="hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
        <svg class="w-3.5 h-3.5 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
      </button>
      
      <span class="text-xs font-medium text-gray-700 dark:text-gray-300">
        {{ currentMonthName }} {{ currentYear }}
      </span>
      
      <button type="button" (click)="nextMonth()" 
              class="hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
        <svg class="w-3.5 h-3.5 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
        </svg>
      </button>
    </div>

    <!-- Week Days - smaller -->
    <div class="grid grid-cols-7 gap-0.5 mb-0.5">
      <div *ngFor="let day of weekDays" class="text-center week-day">
        {{ day }}
      </div>
    </div>

    <!-- Calendar Days - smaller -->
    <div class="grid grid-cols-7 gap-0.5">
      <button *ngFor="let day of daysInMonth" 
              type="button"
              (click)="selectDate(day.date)"
              class="text-center calendar-day"
              [class.text-gray-400]="!day.isCurrentMonth"
              [class.text-gray-700]="day.isCurrentMonth && !isSelected(day.date)"
              [class.dark:text-gray-300]="day.isCurrentMonth && !isSelected(day.date)"
              [class.selected]="isSelected(day.date)"
              [class.opacity-50]="!day.isCurrentMonth"
              [class.disabled-date]="day.isCurrentMonth && !day.isSelectable"
              [disabled]="!day.isCurrentMonth || !day.isSelectable">
        {{ day.day }}
      </button>
    </div>

    <!-- Today Button - smaller -->
    <div class="calendar-divider">
      <button type="button" 
              (click)="selectToday()"
              [disabled]="!isDateSelectable(getTodayDate())"
              class="w-full text-center today-button"
              [class.opacity-50]="!isDateSelectable(getTodayDate())">
        🗓️ Aujourd'hui
      </button>
    </div>
  </div>
</div>
